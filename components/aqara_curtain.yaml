substitutions:
  device_name: aqara-curtain

esphome:
  name: ${device_name}
  platform: ESP8266
  board: esp01_1m          # any 1 MB ESP8266 board

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret ap_password

logger:
ota:
api:

uart:
  id: uart_bus
  tx_pin: GPIO1     # connect to motor RX
  rx_pin: GPIO3     # connect to motor TX
  baud_rate: 9600

# ── External component (local path) ─────────────────────────────────────────
external_components:
  - source:
      type: local
      path: components   # folder that contains ZNCLDJ11L_component/
    components: [ ZNCLDJ11L_component ]

# ── Aqara curtain motor component ───────────────────────────────────────────
ZNCLDJ11L_component:
  id: curtain_motor
  uart_id: uart_bus

cover:
  - platform: ZNCLDJ11L_component
    aqara_curtain_id: curtain_motor
    name: "Curtain"
    device_class: curtain

